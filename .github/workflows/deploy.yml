name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push"]
    types: [completed]
    branches: [main, master]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Railway redeploy
        # Set RAILWAY_WEBHOOK_URL in GitHub → Settings → Secrets → Actions
        # Get it from Railway dashboard → Service → Settings → Deploy Webhook
        if: ${{ secrets.RAILWAY_WEBHOOK_URL != '' }}
        run: |
          curl -sSf -X POST "${{ secrets.RAILWAY_WEBHOOK_URL }}"
          echo "Railway redeploy triggered."

      # ── Alternative: Render ──────────────────────────────────────────────────
      # Uncomment if deploying to Render instead of Railway.
      # Set RENDER_DEPLOY_HOOK_URL in GitHub secrets.
      #
      # - name: Trigger Render redeploy
      #   if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
      #   run: curl -sSf "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Done
        run: echo "Deploy workflow complete."
